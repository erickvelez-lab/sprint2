<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="recuperar.css">
</head>
<body>

<div class="contenedor">

    <div class="box">

        <h1>Objetos Perdidos U</h1>
        <h2>Recuperar Contraseña</h2>

        <form onsubmit="mensaje(event)">

            <label>Correo Electrónico</label>

            <input id="email-recuperar" type="email" placeholder="Ingrese su correo" required>

            <button type="submit">
                Recuperar
            </button>

        </form>

    </div>

</div>

<script>

function mensaje(event){
    event.preventDefault();
    const emailInput = document.getElementById('email-recuperar');
    const email = emailInput.value.trim();

    if (!email) {
        alert('Por favor, ingresa tu correo electrónico.');
        emailInput.focus();
        return;
    }

    alert('Recuperación exitosa. Revisa tu correo y vuelve a iniciar sesión.');
    window.location.href = 'iniciarsesion.html';
}

</script>

</body>
</html>
