<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>

    <div class="contenedor">

        <div class="registro-box">

            <h1>Objetos Perdidos U</h1>
            <h2>Crear Cuenta</h2>

            <form onsubmit="event.preventDefault(); 
                const nombre = document.querySelector('input[type=text]').value;
                const email = document.querySelector('input[type=email]').value;
                const password = document.querySelectorAll('input[type=password]')[0].value;
                const confirmPassword = document.querySelectorAll('input[type=password]')[1].value;
                if (password !== confirmPassword) {
                    alert('Las contraseñas no coinciden.');
                    return;
                }
                let users = JSON.parse(sessionStorage.getItem('users')) || [];
                if (users.find(u => u.email === email)) {
                    alert('El correo ya está registrado.');
                    return;
                }
                users.push({ nombre, email, password, role: 'user' });
                sessionStorage.setItem('users', JSON.stringify(users));
                alert('Registro exitoso. Ahora puedes iniciar sesión.');
                window.location.href='iniciarsesion.html'">

                <label>Nombre Completo</label>
                <input type="text" placeholder="Ingrese su nombre" required>

                <label>Correo Electrónico</label>
                <input type="email" placeholder="Ingrese su correo" required>

                <label>Contraseña</label>
                <input type="password" placeholder="Ingrese su contraseña" required>

                <label>Confirmar Contraseña</label>
                <input type="password" placeholder="Confirme la contraseña" required>

                <button type="submit">
                    Registrarse
                </button>

            </form>

            <p>
                ¿Ya tienes cuenta?
                <a href="iniciarsesion.html">Inicia sesión</a>
            </p>

        </div>

    </div>

</body>
</html>
