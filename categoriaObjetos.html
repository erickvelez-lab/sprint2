<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Categorías de Objetos</title>

<link rel="stylesheet" href="categoriaObjetos.css">

</head>

<body>

<header>
    <h1>Objetos Perdidos</h1>
    <nav>
        <button onclick="window.location.href='index.html'">Inicio</button>
        <button id="sessionButton"></button>
    </nav>
</header>

<div class="filter-container">
    <select id="categoryFilter" onchange="filtrarCategoria()">
        <option value="Todas">Todas las categorías</option>
    </select>
</div>

<div class="container" id="objectContainer">

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        const sessionButton = document.getElementById('sessionButton');
        const objetos = JSON.parse(sessionStorage.getItem('objetos')) || [];
        const isAdmin = currentUser && currentUser.role === 'admin';
        const visibleObjects = objetos
            .map((obj, index) => ({ obj, index }))
            .filter(item => isAdmin || item.obj.estado === 'Aprobado');

        if (currentUser) {
            sessionButton.textContent = 'Cerrar Sesión';
            sessionButton.onclick = function() {
                sessionStorage.removeItem('currentUser');
                alert('Sesión cerrada exitosamente.');
                window.location.href = 'iniciarsesion.html';
            };
        } else {
            sessionButton.textContent = 'Iniciar Sesión';
            sessionButton.onclick = function() {
                window.location.href = 'iniciarsesion.html';
            };
        }

        const categoryFilter = document.getElementById('categoryFilter');
        const objectContainer = document.getElementById('objectContainer');

        const categories = [...new Set(visibleObjects.map(item => item.obj.categoria).filter(Boolean))];
        categories.forEach(category => {
            const option = document.createElement('option');
            option.value = category;
            option.textContent = category;
            categoryFilter.appendChild(option);
        });

        function renderObjects(filter) {
            objectContainer.innerHTML = '';
            const filtered = filter && filter !== 'Todas'
                ? visibleObjects.filter(item => item.obj.categoria === filter)
                : visibleObjects;

            if (filtered.length === 0) {
                objectContainer.innerHTML = '<p>No hay publicaciones disponibles para esta categoría.</p>';
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.category = item.obj.categoria || '';
                card.innerHTML = `
                    <h3>${item.obj.nombre}</h3>
                    <p>${item.obj.descripcion || ''}</p>
                    <p><strong>Categoría:</strong> ${item.obj.categoria || 'No especificada'}</p>
                    <p><strong>Ubicación:</strong> ${item.obj.ubicacion || 'No especificada'}</p>
                    <button onclick="verDetalles(${item.index})">Ver detalles</button>
                `;
                objectContainer.appendChild(card);
            });
        }

        window.filtrarCategoria = function() {
            renderObjects(categoryFilter.value);
        };

        window.verDetalles = function(index) {
            const objetos = JSON.parse(sessionStorage.getItem('objetos')) || [];
            if (!objetos[index]) return;
            sessionStorage.setItem('detalleObjeto', JSON.stringify({ obj: objetos[index], index }));
            window.location.href = 'detalles.html';
        };

        renderObjects(categoryFilter.value);
    });
</script>

</body>
</html>
